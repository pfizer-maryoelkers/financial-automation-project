# configs/config_base.yaml

## Forecast Reader
forecast_reader:
  file_paths:
    - "data/forecasts/Other_Vendors_Forecasts.xlsx"
    - "data/forecasts/2026-Feb-IBM Forecast_AP02.xlsx"

## Transactional Detail Reader
transactional_detail_reader:
  file_path: "data/transactional/TIES AP03 2026.xlsx"
  
  required_cols:
    - "PO Number"
    - "Month"
    - "GL Transaction Amount"
  
  valid_types:
    - "Actual"
    - "Accrual"
    - "Reversal"
  
  colmap:
    po: "PO Number"
    month: "Month"
    amount: "AP03"
    classifier: "AP Voucher Number"
    type: "Type"

## Template Writer
template_writer:
  file_path: "data/templates/financial_template_v2_2026.xlsx"
  header_row: 15
  po_column: "B"
  dec_acc_reversal_col: "N"
  
  forecast_source_cols:
    - "PO #"
    - "Jan 2026 - FTotal"
    - "Feb 2026 - FTotal"
    - "March 2026 - FTotal"
    - "April 2026 - FTotal"
    - "May 2026 - FTotal"
    - "June 2026 - FTotal"
    - "July 2026 - FTotal"
    - "Aug 2026 - FTotal"
    - "Sep 2026 - FTotal"
    - "Oct 2026 - FTotal"
    - "Nov 2026 - FTotal"
    - "Dec 2026 - FTotal"

  forecast_sum_exclude_cols:
    - "PO #"

  transactional_source_cols:
    - "PO Number"
    - "Accounting Period"
    - "AP Voucher Number"
    - "Vendor Name"
    - "WBS Element"
    - "GL Invoice Date"
    - "GL Posting Date"
    - "GL Line Description"
    - "Description"
    - "Month"
    - "AP02"
    - "AP03"
    - "Type"