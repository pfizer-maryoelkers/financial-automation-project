# configs/config_base.yaml

# ============================

## Forecast Reader
forecast_reader:
  file_paths:
    - "data/forecasts/Other_Vendors_Forecasts.xlsx"
    - "data/forecasts/2026-Feb-IBM Forecast_AP02.xlsx"
  po_col: "PO #"  # PO column identifier

# ============================

## Transactional Detail Reader
transactional_detail_reader:
  file_path: "data/transactional/TIES AP03 2026.xlsx"
  
  # Columns required for a valid sheet
  required_cols:
    - "PO Number"
    - "Month"
    - "GL Transaction Amount"
  
  # Supported Types - need to add Reclass, etc.
  valid_types:
    - "Actual"  
    - "Accrual"
    - "Reversal"
  
  # Column map - standardized column names
  colmap:
    po: "PO Number"
    month: "Month"
    amount: "GL BER Corp Amount"
    classifier: "AP Voucher Number"   # Column that defines type (Actual, Accrual, Reversal, etc.)
    type: "Type"

# ============================

## Template Reader
template_reader:
  file_path: "data/templates/Ram 2026_Owen Testing.xlsx"
  header_row: 16
  po_col: "B"
  po_stop_marker: "Previous Period Invoices"  
  cost_center_col: "A"
  cost_center_start_row: 9
  

# ============================

## Template Writer
template_writer:
  # file_path: "data/templates/Ram 2026_Owen Testing.xlsx" # - same as template reader, handled in main
  output_path: "data/templates/template_AP03.xlsx"
  overwrite: False # if true, overwrites previous months data (dault false)

  # Template specific configs - tells system where to begin writing data
  # header_row: 15 # - same as template reader, handled in main
  # po_column: "B" # - same as template reader, handled in main
  dec_acc_reversal_col: "N"
  

  ## Source info. Tells which columns to include on source sheets
  # Forecast source columns:
  forecast_source_cols:
    - "PO #"
    - "Jan 2026 - FTotal"
    - "Feb 2026 - FTotal"
    - "March 2026 - FTotal"
    - "April 2026 - FTotal"
    - "May 2026 - FTotal"
    - "June 2026 - FTotal"
    - "July 2026 - FTotal"
    - "Aug 2026 - FTotal"
    - "Sep 2026 - FTotal"
    - "Oct 2026 - FTotal"
    - "Nov 2026 - FTotal"
    - "Dec 2026 - FTotal"

  # Excluding PO column from being summed (Forecast source)
  forecast_sum_exclude_cols:
    - "PO #"

  # Transactional source columns:
  transactional_source_cols:
    - "PO Number"
    - "Accounting Period"
    - "AP Voucher Number"
    - "Vendor Name"
    - "WBS Element"
    - "GL Invoice Date"
    - "GL Posting Date"
    - "GL Line Description"
    - "Description"
    - "GL Transaction Amount"
    - "GL BER Corp Amount"
    - "Month"
    - "AP01"
    - "AP02"
    - "AP03"
    - "Type"